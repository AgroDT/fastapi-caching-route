name: PR Checks

on:
  pull_request:
    branches:
      - main

jobs:
  pytest:
    name: Tests Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.10', '3.11', '3.12', '3.13', '3.14', '3.14t']
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b

      - name: Install the project
        run: uv sync --frozen

      - name: Run pytest
        run: uv run --no-sync pytest --no-cov

  code-quality:
    name: Code Quality
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version-file: pyproject.toml

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b

      - name: Check uv.lock
        run: uv lock --check

      - name: Install the project
        run: uv sync --frozen

      - name: Ruff check
        id: ruff-check
        continue-on-error: true
        run: uv run --no-sync ruff check --output-format=github

      - name: Ruff format
        id: ruff-format
        continue-on-error: true
        run: uv run --no-sync ruff format --check --output-format=github

      - name: Type check
        id: ty
        continue-on-error: true
        run: uv run --no-sync ty check --output-format=github

      - name: Fail if any step failed
        if: |
          steps.ruff-check.outcome == 'failure' ||
          steps.ruff-format.outcome == 'failure' ||
          steps.ty.outcome == 'failure'
        run: exit 1

  summary:
    name: PR Checks Summary
    runs-on: ubuntu-latest
    if: always()
    needs: [pytest, code-quality]
    steps:
      - run: >
          test
          "${{ needs.pytest.result }}" = "success" -a
          "${{ needs.code-quality.result }}" = "success"
